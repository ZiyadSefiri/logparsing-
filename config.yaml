# Configuration globale du projet

# Paths
paths:
  raw_data: "./data/raw/"
  processed_data: "./data/processed/"
  models: "./models/"
  results: "./results/"
  logs: "./logs/"

# Dataset
dataset:
  name: "hdfs"  # Options: hdfs, bgl, thunderbird
  test_size: 0.2
  val_size: 0.1

# Preprocessing
preprocessing:
  max_length: 256
  min_freq: 2
  remove_stop_words: true
  lowercase: true

# Model
model:
  type: "transformer"  # Options: transformer, lstm, random_forest
  name: "distilbert-base-uncased"
  num_classes: 5
  hidden_dim: 256
  num_layers: 2
  dropout: 0.2

# Training
training:
  batch_size: 32
  epochs: 10
  learning_rate: 2e-5
  weight_decay: 1e-5
  warmup_steps: 500
  device: "cpu"  # Change en "cuda" si GPU disponible

# Inference
inference:
  threshold: 0.7
  top_k: 3

# Docker streaming
docker:
  enabled: true
  all_running: true
  tail: 100
  raw_output: "./data/raw/docker_logs.csv"
